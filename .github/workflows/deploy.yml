name: Deploy static root to Supabase Hosting (Manual Install - Robust)

on:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  BUILD_DIR: ./   # deploy repo root
  SUPABASE_PROJECT_REF: claiocujbaffmmtbuexv

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List repo (for debug)
        run: |
          echo "Repo root files:"
          ls -la

      - name: Validate SUPABASE_ACCESS_TOKEN
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "Error: SUPABASE_ACCESS_TOKEN is not set"; exit 1;
          fi

      - name: Install Supabase CLI (resolve via GitHub API)
        id: install_explicit
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Attempting release-asset install via GitHub Releases API..."
          ARCH=$(uname -m)
          echo "Detected arch: $ARCH"
          if [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "amd64" ]; then
            PATTERN="linux.*(x86_64|amd64)|x86_64|amd64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            PATTERN="linux.*(arm64|aarch64)|arm64|aarch64"
          else
            echo "Unsupported arch: $ARCH"; exit 1;
          fi

          echo "Searching releases for pattern: $PATTERN"

          AUTH_HEADER=""
          if [ -n "${GITHUB_API_TOKEN:-}" ]; then
            AUTH_HEADER="Authorization: token ${GITHUB_API_TOKEN}"
          fi

          # Fetch latest release JSON
          RELEASE_JSON=$(curl -sSL -H "$AUTH_HEADER" "https://api.github.com/repos/supabase/cli/releases/latest")
          echo "Fetched release info (name/tag):"
          echo "$RELEASE_JSON" | jq -r '.name, .tag_name' || true

          DOWNLOAD_URL=$(
            echo "$RELEASE_JSON" \
              | jq -r '.assets[]?.browser_download_url // empty' \
              | grep -Ei "${PATTERN}" \
              | head -n1
          )

          if [ -z "${DOWNLOAD_URL:-}" ]; then
            echo "ERROR: could not determine download URL from GitHub releases for pattern '${PATTERN}'"
            echo "Full release JSON for debugging:"
            echo "$RELEASE_JSON"
            exit 1
          fi

          echo "Downloading asset: $DOWNLOAD_URL"

          RETRIES=3
          for i in $(seq 1 $RETRIES); do
            echo "Download attempt $i..."
            if curl -fSL -o /tmp/supabase.tar.gz "$DOWNLOAD_URL"; then
              echo "Download succeeded on attempt $i"
              break
            else
              echo "Download failed on attempt $i"
              if [ $i -lt $RETRIES ]; then
                sleep $((i * 5))
              else
                echo "All download attempts failed"; exit 2
              fi
            fi
          done

          echo "Downloaded file info:"
          ls -lh /tmp/supabase.tar.gz
          file /tmp/supabase.tar.gz || true

          if gzip -t /tmp/supabase.tar.gz >/dev/null 2>&1; then
            echo "gzip validation passed"
          else
            echo "ERROR: downloaded file is not a valid gzip archive. Showing head for debugging:"
            head -n 200 /tmp/supabase.tar.gz || true
            exit 3
          fi

          mkdir -p /tmp/supabase_extract
          tar -xzf /tmp/supabase.tar.gz -C /tmp/supabase_extract
          if [ -f /tmp/supabase_extract/supabase ]; then
            sudo mv /tmp/supabase_extract/supabase /usr/local/bin/supabase
            sudo chmod +x /usr/local/bin/supabase
            echo "Installed to /usr/local/bin/supabase"
          else
            echo "ERROR: supabase binary not found inside archive. Listing extracted files:"
            ls -la /tmp/supabase_extract || true
            exit 4
          fi

          supabase --version

      - name: Final verify supabase on PATH
        run: |
          echo "which supabase:"
          which supabase || true
          echo "supabase --version output (if available):"
          supabase --version || true

      - name: Supabase login (CI) with fallback
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          if ! command -v supabase >/dev/null 2>&1; then
            echo "supabase CLI not found on PATH. Exiting."
            exit 1
          fi

          # Try non-interactive login; else fall back to env var for deploy
          if supabase login --token "$SUPABASE_ACCESS_TOKEN" --no-browser >/dev/null 2>&1; then
            echo "Logged in with supabase CLI using --token"
          else
            echo "Non-interactive login using --token failed; exporting SUPABASE_ACCESS_TOKEN for deploy command"
            export SUPABASE_ACCESS_TOKEN="$SUPABASE_ACCESS_TOKEN"
          fi

      - name: Deploy to Supabase Hosting
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          if [ ! -d "${{ env.BUILD_DIR }}" ] && [ ! -f "${{ env.BUILD_DIR }}" ]; then
            echo "Error: BUILD_DIR '${{ env.BUILD_DIR }}' does not exist in the repo"; exit 1;
          fi
          supabase hosting deploy --project-ref ${{ env.SUPABASE_PROJECT_REF }} --dir ${{ env.BUILD_DIR }}