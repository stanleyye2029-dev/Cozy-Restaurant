name: Deploy static root to Supabase Hosting

on:
  push:
    branches: [ main ]  # change to your deploy branch if needed

permissions:
  contents: read

env:
  BUILD_DIR: ./   # deploy repo root

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List repo (for debug)
        run: |
          echo "Repo root files:"
          ls -la

      - name: Validate SUPABASE_ACCESS_TOKEN
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "Error: SUPABASE_ACCESS_TOKEN is not set"; exit 1;
          fi

      - name: Install Supabase CLI (Deb install script)
        run: |
          curl -sL https://deb.supabase.com/cli/install | sh
          supabase --version

      - name: Supabase login (CI)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "$SUPABASE_ACCESS_TOKEN" | supabase login --access-token -

      - name: Deploy to Supabase Hosting
        run: |
          if [ ! -d "${{ env.BUILD_DIR }}" ] && [ ! -f "${{ env.BUILD_DIR }}" ]; then
            echo "Error: BUILD_DIR '${{ env.BUILD_DIR }}' does not exist in the repo"; exit 1;
          fi
          supabase hosting deploy --project-ref claiocujbaffmmtbuexv --dir ${{ env.BUILD_DIR }}
