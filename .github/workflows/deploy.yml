name: Deploy to Supabase Hosting

on:
  push:
    branches: [ main ] # change to your deploy branch if needed

permissions:
  contents: read

env:
  BUILD_DIR: ./build  # change to ./dist or ./out if needed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Validate SUPABASE_ACCESS_TOKEN
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "Error: SUPABASE_ACCESS_TOKEN is not set"; exit 1;
          fi

      - name: Install Supabase CLI
        run: |
          curl -sL "https://github.com/supabase/cli/releases/latest/download/supabase_$(uname -s)_$(uname -m).tar.gz" | tar -xz
          sudo mv supabase /usr/local/bin/supabase
          supabase --version

      - name: Supabase login (CI)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "$SUPABASE_ACCESS_TOKEN" | supabase login --access-token -

      - name: Deploy to Supabase Hosting
        run: supabase hosting deploy --project-ref claiocujbaffmmtbuexv --dir ${{ env.BUILD_DIR }}
