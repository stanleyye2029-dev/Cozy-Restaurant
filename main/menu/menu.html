<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!--<title>Cozy Restaurant</title>--Original title-->
    <title>Lofi Daydreams</title>

    <link rel="stylesheet" href="menu.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>

    <!-- Background Music -->
    <audio id="background-music" loop>
        <source src="../../assets/music/casual_afternoon.wav" type="audio/wav">
    </audio>

    <!-- Volume Button -->
    <button id="volumeBtn">
        <span id="volumeIcon" class="material-symbols-outlined">volume_up</span>
    </button>

    <!-- Settings Button -->
    <button id="settingsBtn">
        <span class="material-symbols-outlined">settings</span>
    </button>

    <!-- Menu -->
    <div class="menu-container">
        <!--<h1 id="menu-title">Cozy Restaurant</h1> original title-->
        <h1 id="menu-title">Lofi Daydreams</h1>
        <div class="menu-items">
            <a href="#" class="image-button" id="playButton" onclick="initiateTransition(event)"></a>
        </div>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settingsPanel" class="settings-panel hidden">
        <div class="settings-box">
            <div class="settings-content">

                <!-- SAVE SECTION -->
                <div class="section save-section">
                    <h2>Save Settings</h2>
                    <button id="saveSettingsBtn">Save</button>
                    <button id="clearSettingsBtn" class="clear-btn">Clear Save</button>
                    <p class="warning">Warning: Clearing will reset all settings to default!</p>

                    <!-- Export / Import -->
                    <div class="export-import">
                        <button id="exportSaveBtn">Export Save</button>
                        <button id="importSaveBtn">Import Save</button>
                        <textarea id="saveDataTextarea" placeholder="Paste exported save here"></textarea>
                    </div>
                </div>
                <hr class="section-dividers">

                <!-- MUSIC SECTION -->
                <div class="section music-section">
                    <h2>Music Settings</h2>
                    <div class="setting">
                        <span>Master Music</span>
                        <button id="masterMusicToggle">On</button>
                    </div>
                    <div class="setting">
                        <span>Master Volume</span>
                        <input id="volumeSlider" type="range" min="0" max="1" step="0.01">
                    </div>
                    <div class="setting">
                        <span>SFX</span>
                        <button id="sfxToggle">On</button>
                    </div>
                </div>
                <hr class="section-dividers">

                <button id="closeSettings">Close</button>
            </div>
        </div>
    </div>

    <div class="transition-screen" id="transition-screen"></div>

<script src="menu.js"></script>

</body>
</html>
