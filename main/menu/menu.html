<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Restaurant</title>

    <link rel="stylesheet" href="menu.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>

    <!-- Background Music -->
    <audio id="background-music" loop>
        <source src="../../assets/music/casual_afternoon.wav" type="audio/wav">
    </audio>

    <!-- Volume Button -->
    <button id="volumeBtn">
        <span id="volumeIcon" class="material-symbols-outlined">volume_up</span>
    </button>

    <!-- Settings Button -->
    <button id="settingsBtn">
        <span class="material-symbols-outlined">settings</span>
    </button>

    <!-- Menu -->
    <div class="menu-container">
        <h1 id="menu-title">Cozy Restaurant</h1>
        <div class="menu-items">
            <a href="../cozy-restaurant-game/main_restaurant/main_restaurant.html" class="image-button"></a>
        </div>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settingsPanel" class="settings-panel hidden">
        <div class="settings-box">

            <!-- SAVE SECTION -->
            <div class="section save-section">
                <h2>Save Settings</h2>
                <button id="saveSettingsBtn">Save</button>
                <button id="clearSettingsBtn" class="clear-btn">Clear Save</button>
                <p class="warning">Warning: Clearing will reset all settings to default!</p>
            </div>

            <!-- MUSIC SECTION -->
            <div class="section music-section">
                <h2>Music Settings</h2>
                <div class="setting">
                    <span>Master Music</span>
                    <button id="masterMusicToggle">On</button>
                </div>
                <div class="setting">
                    <span>Master Volume</span>
                    <input id="volumeSlider" type="range" min="0" max="1" step="0.01">
                </div>
                <div class="setting">
                    <span>SFX</span>
                    <button id="sfxToggle">On</button>
                </div>
            </div>

            <button id="closeSettings">Close</button>
        </div>
    </div>

<script>
/* ---------------- AUDIO MANAGER ---------------- */
const AudioManager = {
    music: document.getElementById("background-music"),
    masterMusic: true,
    muted: false,
    volume: 0.5,
    sfxEnabled: true,
    sounds: {},

    startMusic() {
        if(!this.masterMusic) return;
        if(this.music.paused){
            this.music.volume = this.volume;
            this.music.muted = this.muted;
            this.music.play().catch(()=>{});
        }
    },

    updateMusicState() {
        if(!this.masterMusic){
            this.music.pause();
            return;
        }
        this.music.volume = this.volume;
        this.music.muted = this.muted;
        if(this.music.paused){
            this.music.play().catch(()=>{});
        }
    },

    toggleMute() {
        if(!this.masterMusic) return this.muted;
        this.muted = !this.muted;
        this.updateMusicState();
        return this.muted;
    },

    toggleMasterMusic() {
        this.masterMusic = !this.masterMusic;
        if(!this.masterMusic){
            this.muted = true;
        } else {
            this.muted = false;
        }
        this.updateMusicState();
        return this.masterMusic;
    },

    playSound(name){
        if(!this.sfxEnabled) return;
        if(!this.sounds[name]){
            const audio = new Audio(`../../assets/sfx/${name}.wav`);
            this.sounds[name] = audio;
        }
        const sound = this.sounds[name];
        sound.currentTime = 0;
        sound.play();
    }
};

/* ---------------- FIRST INTERACTION ---------------- */
document.addEventListener("click", function startMusic(){
    AudioManager.startMusic();
    document.removeEventListener("click", startMusic);
}, true);

/* ---------------- GLOBAL CLICK SOUND ---------------- */
document.addEventListener("mousedown",(event)=>{
    if(event.target.closest("button, a")){
        AudioManager.playSound("click");
    }
});

/* ---------------- UI ELEMENTS ---------------- */
const volumeBtn = document.getElementById("volumeBtn");
const volumeIcon = document.getElementById("volumeIcon");
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const closeSettings = document.getElementById("closeSettings");
const masterMusicToggle = document.getElementById("masterMusicToggle");
const volumeSlider = document.getElementById("volumeSlider");
const sfxToggle = document.getElementById("sfxToggle");
const saveSettingsBtn = document.getElementById("saveSettingsBtn");
const clearSettingsBtn = document.getElementById("clearSettingsBtn");

/* ---------------- SYNC UI ---------------- */
function updateUI() {
    if(!AudioManager.masterMusic){
        volumeIcon.textContent = "volume_off";
    } else {
        volumeIcon.textContent = AudioManager.muted ? "volume_off" : "volume_up";
    }
    masterMusicToggle.textContent = AudioManager.masterMusic ? "On" : "Off";
    volumeSlider.value = AudioManager.volume;
    sfxToggle.textContent = AudioManager.sfxEnabled ? "On" : "Off";
}

/* ---------------- VOLUME BUTTON ---------------- */
volumeBtn.onclick = ()=>{
    if(!AudioManager.masterMusic) return;
    AudioManager.toggleMute();
    updateUI();
};

/* ---------------- SETTINGS PANEL ---------------- */
settingsBtn.onclick = ()=>{
    settingsPanel.classList.remove("hidden");
    settingsPanel.querySelector(".settings-box").classList.add("slideIn");
};
closeSettings.onclick = ()=>{
    settingsPanel.classList.add("hidden");
    settingsPanel.querySelector(".settings-box").classList.remove("slideIn");
};

/* ---------------- MASTER MUSIC ---------------- */
masterMusicToggle.onclick = ()=>{
    AudioManager.toggleMasterMusic();
    updateUI();
};

/* ---------------- VOLUME SLIDER ---------------- */
volumeSlider.oninput = ()=>{
    AudioManager.volume = parseFloat(volumeSlider.value);
    AudioManager.updateMusicState();
};

/* ---------------- SFX TOGGLE ---------------- */
sfxToggle.onclick = ()=>{
    AudioManager.sfxEnabled = !AudioManager.sfxEnabled;
    updateUI();
};

/* ---------------- SAVE / CLEAR ---------------- */
saveSettingsBtn.onclick = saveSettings;
clearSettingsBtn.onclick = ()=>{
    localStorage.removeItem("cozySettings");
    AudioManager.masterMusic = true;
    AudioManager.muted = false;
    AudioManager.volume = 0.5;
    AudioManager.sfxEnabled = true;
    AudioManager.updateMusicState();
    updateUI();
};

/* ---------------- SAVE SETTINGS FUNCTION ---------------- */
function saveSettings(){
    const settings = {
        masterMusic: AudioManager.masterMusic,
        muted: AudioManager.muted,
        sfx: AudioManager.sfxEnabled,
        volume: AudioManager.volume
    };
    localStorage.setItem("cozySettings", JSON.stringify(settings));
}

/* ---------------- LOAD SETTINGS ---------------- */
function loadSettings(){
    const data = localStorage.getItem("cozySettings");
    if(!data) return;
    const settings = JSON.parse(data);
    AudioManager.masterMusic = settings.masterMusic;
    AudioManager.muted = settings.muted;
    AudioManager.sfxEnabled = settings.sfx;
    AudioManager.volume = settings.volume;
    AudioManager.updateMusicState();
}
loadSettings();
updateUI();
</script>

</body>
</html>
