name: Deploy static root to Supabase Hosting

on:
  push:
    branches: [ main ]  # change to your deploy branch if needed

permissions:
  contents: read

env:
  BUILD_DIR: ./   # deploy repo root
  SUPABASE_PROJECT_REF: claiocujbaffmmtbuexv

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List repo (for debug)
        run: |
          echo "Repo root files:"
          ls -la

      - name: Validate SUPABASE_ACCESS_TOKEN
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "Error: SUPABASE_ACCESS_TOKEN is not set"; exit 1;
          fi

      - name: Install Supabase CLI (explicit deterministic)
        id: install_explicit
        run: |
          set -e
          echo "Attempting explicit release-asset install..."
          ARCH=$(uname -m)
          echo "Detected arch: $ARCH"
          if [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "amd64" ]; then
            ASSET="Linux_x86_64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            ASSET="Linux_arm64"
          else
            echo "Unsupported arch: $ARCH"; exit 1;
          fi
          DOWNLOAD_URL="https://github.com/supabase/cli/releases/latest/download/supabase_${ASSET}.tar.gz"
          echo "Downloading asset: $DOWNLOAD_URL"
          curl -sL "$DOWNLOAD_URL" -o /tmp/supabase.tar.gz
          echo "Downloaded size:"
          ls -lh /tmp/supabase.tar.gz
          file /tmp/supabase.tar.gz || true
          # Try to extract
          tar -xzf /tmp/supabase.tar.gz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
          sudo chmod +x /usr/local/bin/supabase
          echo "Installed to /usr/local/bin/supabase"
          supabase --version

      - name: Fallback: Install Supabase CLI (Debian installer debug)
        if: failure() && steps.install_explicit.outcome != 'success'
        id: install_deb_debug
        run: |
          set -x
          echo "Explicit install failed — running Debian installer in debug mode"
          # Run the installer with -x so we can see steps
          curl -sL https://deb.supabase.com/cli/install | sh -x
          echo "Check /usr/local/bin for supabase binary"
          ls -la /usr/local/bin | grep supabase || true
          echo "which supabase:"
          which supabase || true
          echo "echo \$PATH: $PATH"
          echo "Attempt supabase --version (may fail if not on PATH)"
          supabase --version || true

      - name: Final verify supabase on PATH
        run: |
          echo "which supabase:"
          which supabase || true
          echo "supabase --version output (if available):"
          supabase --version || true

      - name: Supabase login (CI)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          if ! command -v supabase >/dev/null 2>&1; then
            echo "supabase CLI not found on PATH. Exiting."
            exit 1
          fi
          echo "$SUPABASE_ACCESS_TOKEN" | supabase login --access-token -

      - name: Deploy to Supabase Hosting
        run: |
          set -e
          if [ ! -d "${{ env.BUILD_DIR }}" ] && [ ! -f "${{ env.BUILD_DIR }}" ]; then
            echo "Error: BUILD_DIR '${{ env.BUILD_DIR }}' does not exist in the repo"; exit 1;
          fi
          supabase hosting deploy --project-ref ${{ env.SUPABASE_PROJECT_REF }} --dir ${{ env.BUILD_DIR }}
